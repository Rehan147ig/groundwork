name: python-ci

# Installs the ingestion service's dependencies and runs its unit tests.
# Tests run entirely against in-memory fakes (InMemoryIndex, HashEmbeddingEngine) - no live
# Qdrant, Elasticsearch, or other external service is required.
#
# NOTE on the discover command: the tests live in services/ingestion/tests/ (not a package),
# so a bare `python -m unittest discover` from services/ingestion finds 0 tests and exits 0
# (a false green). We use `-s tests` so the suite is actually collected. See docs/ci.md.
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    name: python-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ingestion/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
