name: secret-scan

# Scans every pull request for committed secrets, API keys, and tokens with gitleaks.
# Runs on EVERY PR regardless of which paths changed - a leaked credential anywhere in the
# diff must block the merge. fetch-depth: 0 gives gitleaks the full history it needs to scan
# the PR's commit range.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for GitHub ORGANIZATION accounts. This repo is a
          # personal account, so no license is needed. If it moves under an org, add the
          # license as a repo/org secret named GITLEAKS_LICENSE.
