# Groundwork bank-demo infrastructure stack.
#
# Brings up the three backends the runtime needs (Postgres, Qdrant, OpenFGA) plus a
# small deterministic embedding service so the seeder and runtime have something to
# call when the query path computes a question embedding.
#
# Usage:
#   cd examples/bank-demo
#   docker compose -f docker-compose.demo.yml up -d
#
# Then run the Groundwork query-runtime and the Spring Boot bank-client locally as
# documented in README.md. (We deliberately keep the runtime and bank-client out of this
# compose so they can be rebuilt and restarted quickly during the demo without bringing
# the infra down.)

services:

  postgres:
    image: postgres:16-alpine
    container_name: gw-demo-postgres
    environment:
      POSTGRES_USER: groundwork
      POSTGRES_PASSWORD: groundwork
      POSTGRES_DB: groundwork
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Migrations applied automatically on first start. Mounts the repo's
      # migrations/ directory so this compose tracks the canonical schema.
      - ../../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groundwork"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: gw-demo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  openfga:
    image: openfga/openfga:v1.5.4
    container_name: gw-demo-openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_HTTP_ADDR: 0.0.0.0:8081
      OPENFGA_LOG_LEVEL: warn
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz | grep -q SERVING || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Tiny deterministic embedder. Returns a fixed-shape, content-hashed vector for any
  # input. Sufficient for the demo's lexical-matching path; production deployments
  # point GW at a real embedding service.
  embedder:
    image: python:3.12-alpine
    container_name: gw-demo-embedder
    working_dir: /app
    ports:
      - "9000:9000"
    command:
      - sh
      - -c
      - |
        cat > /tmp/embed.py <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import hashlib, json, struct
        DIM = 384
        def deterministic(text: str):
            seed = hashlib.sha256(text.encode("utf-8")).digest()
            out = []
            buf = seed
            while len(out) < DIM:
                buf = hashlib.sha256(buf).digest()
                for i in range(0, len(buf), 4):
                    if len(out) >= DIM: break
                    n = struct.unpack(">I", buf[i:i+4])[0]
                    out.append((n / 2**32) * 2 - 1)
            return out
        class H(BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                body = self.rfile.read(length)
                try:
                    payload = json.loads(body)
                    text = payload.get("text", "")
                except Exception:
                    text = ""
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"embedding": deterministic(text)}).encode())
            def log_message(self, *args, **kwargs): pass
        HTTPServer(("0.0.0.0", 9000), H).serve_forever()
        PY
        python /tmp/embed.py

volumes:
  postgres-data:
  qdrant-data:
