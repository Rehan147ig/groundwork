# Groundwork bank-demo infrastructure stack.
services:

  postgres:
    image: postgres:16-alpine
    container_name: gw-demo-postgres
    environment:
      POSTGRES_USER: groundwork
      POSTGRES_PASSWORD: groundwork
      POSTGRES_DB: groundwork
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U groundwork"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: gw-demo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  openfga:
    image: openfga/openfga:v1.5.4
    container_name: gw-demo-openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_LOG_LEVEL: warn
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -q SERVING || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  embedder:
    image: python:3.12-alpine
    container_name: gw-demo-embedder
    working_dir: /app
    ports:
      - "9000:9000"
    command:
      - sh
      - -c
      - |
        cat > /tmp/embed.py <<'PY'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import hashlib, json, struct
        DIM = 384
        def deterministic(text: str):
            t = text.lower()
            if "executive compensation" in t:
                seed = hashlib.sha256(b"exec_comp").digest()
            elif "stark industries" in t:
                seed = hashlib.sha256(b"stark").digest()
            elif "adverse media" in t or "hammer" in t:
                seed = hashlib.sha256(b"hammer").digest()
            elif "whistleblower" in t:
                seed = hashlib.sha256(b"whistleblower").digest()
            elif "credit policy" in t:
                seed = hashlib.sha256(b"credit_policy").digest()
            else:
                seed = hashlib.sha256(text.encode("utf-8")).digest()
            out = []
            buf = seed
            while len(out) < DIM:
                buf = hashlib.sha256(buf).digest()
                for i in range(0, len(buf), 4):
                    if len(out) >= DIM: break
                    n = struct.unpack(">I", buf[i:i+4])[0]
                    out.append((n / 2**32) * 2 - 1)
            return out
        class H(BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                body = self.rfile.read(length)
                try:
                    payload = json.loads(body)
                    text = payload.get("text", "")
                except Exception:
                    text = ""
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"embedding": deterministic(text)}).encode())
            def log_message(self, *args, **kwargs): pass
        HTTPServer(("0.0.0.0", 9000), H).serve_forever()
        PY
        python /tmp/embed.py

volumes:
  postgres-data:
  qdrant-data:
