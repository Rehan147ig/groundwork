# Groundwork public ingress (non-bypassable deployment profile).
#
# This is the ONLY service exposed to the outside world. It forwards a strict
# allow-list of Groundwork paths to query-runtime over the internal Docker network.
# Everything else (including the backends and the admin API-key endpoints) is rejected
# with 404 — they are never reachable through the public ingress.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Request body cap — matches query-runtime's 1 MiB MaxBytesReader on /v1/query and /mcp.
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Rate limiting: per-client request rate + concurrent connection cap.
    limit_req_zone  $binary_remote_addr zone=gw_api:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=gw_conn:10m;
    limit_req_status  429;
    limit_conn_status 429;

    # Internal upstreams (resolved via Docker DNS on the internal network).
    upstream query_runtime { server query-runtime:8080; }
    upstream console_ui    { server console:3000; }

    log_format gw '$remote_addr - $status "$request" rt=$request_time';
    access_log /var/log/nginx/access.log gw;

    server {
        listen 80;
        server_name _;

        # Security headers on every response.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header X-XSS-Protection "1; mode=block" always;
        # Enable once TLS terminates here or upstream:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Common proxy settings. NOTE: nginx forwards request headers by default, so the
        # Authorization / X-Groundwork-API-Key / X-Groundwork-User-Assertion headers reach
        # query-runtime unchanged — auth and identity are enforced there, untouched.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        limit_conn gw_conn 50;

        # --- Groundwork data-plane API (the only retrieval path) ---
        location = /v1/query {
            limit_req zone=gw_api burst=20 nodelay;
            proxy_pass http://query_runtime;
        }

        # Cloud MCP HTTP endpoint (JSON-RPC 2.0 over POST).
        location = /mcp {
            limit_req zone=gw_api burst=20 nodelay;
            proxy_pass http://query_runtime;
        }

        # Liveness / readiness (used by load balancers and orchestrators; no rate limit).
        location = /healthz { proxy_pass http://query_runtime; }
        location = /readyz  { proxy_pass http://query_runtime; }

        # --- Console (OPTIONAL). Requires the Next.js app to be built with
        #     basePath '/console' so its assets resolve, OR host it on its own subdomain.
        # location /console/ {
        #     proxy_pass http://console_ui/;
        # }

        # --- Prometheus metrics: INTERNAL by default. Do NOT expose publicly. Uncomment
        #     and restrict to your scraper's CIDR only if you must scrape via the gateway.
        # location = /metrics {
        #     allow 10.0.0.0/8;
        #     allow 172.16.0.0/12;
        #     deny all;
        #     proxy_pass http://query_runtime;
        # }

        # Default-closed: every other path (admin API-key endpoints, backend probes,
        # arbitrary scans) is rejected. Backends have no host ports anyway; this ensures
        # they are not reachable through the gateway either.
        location / {
            return 404;
        }
    }
}
